<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback de Iteración</title>
    <style>
        /* Variables de diseño (Sistema de diseño corporativo y UI) */
        :root {
            --color-primario: #2D6DF6; /* Azul principal */
            --color-fondo: #F4F6F8;
            --color-superficie: #FFFFFF; /* Blanco puro */
            --color-texto: #111827;
            --color-texto-secundario: #888B8D; /* Gris neutro */
            --color-borde: #E5E7EB;
            --color-error: #EF4444;
            --color-adecuada: #F59E0B; /* Amarillo para estado neutral/adecuado */
            --sombra-suave: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --transicion: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--color-fondo);
            color: var(--color-texto);
            line-height: 1.5;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            background-color: var(--color-superficie);
            max-width: 650px;
            width: 100%;
            border-radius: 12px;
            box-shadow: var(--sombra-suave);
            overflow: hidden;
        }

        .form-header {
            background-color: var(--color-primario);
            color: var(--color-superficie);
            padding: 30px 40px;
        }

        .form-header h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .form-header p {
            margin: 0;
            font-size: 0.95rem;
            opacity: 0.9;
            text-align: justify;
        }

        .form-body {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 35px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.05rem;
            color: var(--color-texto);
        }

        .required::after {
            content: " *";
            color: var(--color-error);
        }

        /* --- Estilos UX para Radio Buttons (Tarjetas de Velocidad) --- */
        .radio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 12px;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .radio-card {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 10px;
            border: 2px solid var(--color-borde);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--color-texto-secundario);
            transition: var(--transicion);
            text-align: center;
            height: 100%;
            box-sizing: border-box;
        }

        .radio-option:hover .radio-card {
            border-color: #CBD5E1;
            background-color: #F8FAFC;
        }

        /* Estados seleccionados */
        .radio-option input[type="radio"]:checked + .radio-card {
            border-color: var(--color-primario);
            background-color: rgba(45, 109, 246, 0.05);
            color: var(--color-primario);
            font-weight: 600;
        }

        /* Estado específico para 'Adecuada' */
        .radio-option input[value="Adecuada"]:checked + .radio-card {
            border-color: var(--color-adecuada);
            background-color: rgba(245, 158, 11, 0.08);
            color: #D97706;
        }

        .radio-option input[type="radio"]:focus-visible + .radio-card {
            outline: 2px solid var(--color-primario);
            outline-offset: 2px;
        }

        /* --- Estilos UX para Checkboxes (Factores) --- */
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }

        .checkbox-option {
            display: flex;
            align-items: flex-start;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: var(--transicion);
        }

        .checkbox-option:hover {
            background-color: #F8FAFC;
        }

        .checkbox-option input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--color-texto-secundario);
            border-radius: 4px;
            margin: 0 12px 0 0;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: var(--transicion);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .checkbox-option input[type="checkbox"]::before {
            content: "";
            width: 10px;
            height: 10px;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em var(--color-superficie);
            background-color: transform;
            transform-origin: bottom left;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .checkbox-option input[type="checkbox"]:checked {
            background-color: var(--color-primario);
            border-color: var(--color-primario);
        }

        .checkbox-option input[type="checkbox"]:checked::before {
            transform: scale(1.1);
        }

        .checkbox-label-text {
            font-size: 0.95rem;
            color: var(--color-texto);
        }

        /* --- Estilos para Textarea --- */
        textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--color-borde);
            border-radius: 8px;
            resize: vertical;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--color-texto);
            box-sizing: border-box;
            transition: var(--transicion);
        }

        textarea:focus {
            outline: none;
            border-color: var(--color-primario);
            background-color: rgba(45, 109, 246, 0.02);
        }

        textarea::placeholder {
            color: #A1A1AA;
        }

        /* --- Botón de Envío --- */
        .btn-submit {
            background-color: var(--color-primario);
            color: var(--color-superficie);
            border: none;
            padding: 16px 24px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: var(--transicion);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background-color: #1E50BA;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(45, 109, 246, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            background-color: var(--color-texto-secundario);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Responsive móvil */
        @media (max-width: 600px) {
            body { padding: 15px; }
            .form-header { padding: 25px; }
            .form-body { padding: 25px; }
            .checkbox-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<main class="form-container">
    <header class="form-header">
        <h2>Feedback del Sprint</h2>
        <p>Captura rápida de la percepción del equipo sobre la velocidad de la iteración e identificación de fricciones. Tu retroalimentación impulsa nuestra mejora continua.</p>
    </header>

    <form id="sprintForm" class="form-body">
        
        <section class="form-section">
            <label class="form-label required" id="velocidad-label">1. ¿Cómo sintió el equipo la velocidad de este Sprint?</label>
            <div class="radio-grid" role="group" aria-labelledby="velocidad-label">
                
                <label class="radio-option">
                    <input type="radio" name="velocidad" value="Muy baja" required>
                    <div class="radio-card">Muy baja</div>
                </label>
                
                <label class="radio-option">
                    <input type="radio" name="velocidad" value="Baja">
                    <div class="radio-card">Baja</div>
                </label>
                
                <label class="radio-option">
                    <input type="radio" name="velocidad" value="Adecuada">
                    <div class="radio-card">Adecuada</div>
                </label>
                
                <label class="radio-option">
                    <input type="radio" name="velocidad" value="Alta">
                    <div class="radio-card">Alta</div>
                </label>
                
                <label class="radio-option">
                    <input type="radio" name="velocidad" value="Muy alta">
                    <div class="radio-card">Muy alta</div>
                </label>

            </div>
        </section>

        <section class="form-section">
            <label class="form-label required" id="factores-label">2. ¿Qué factores afectaron la velocidad? <span style="font-weight: normal; font-size: 0.85em; color: var(--color-texto-secundario);">(marca todos los que aplican)</span></label>
            <div class="checkbox-grid" role="group" aria-labelledby="factores-label">
                
                <label class="checkbox-option"><input type="checkbox" name="factores" value="Historias poco claras"><span class="checkbox-label-text">Historias poco claras</span></label>
                <label class="checkbox-option"><input type="checkbox" name="factores" value="Cambios de alcance"><span class="checkbox-label-text">Cambios de alcance</span></label>
                <label class="checkbox-option"><input type="checkbox" name="factores" value="Falta de backlog"><span class="checkbox-label-text">Falta de backlog</span></label>
                <label class="checkbox-option"><input type="checkbox" name="factores" value="Bloqueos técnicos"><span class="checkbox-label-text">Bloqueos técnicos</span></label>
                <label class="checkbox-option"><input type="checkbox" name="factores" value="Dependencias externas"><span class="checkbox-label-text">Dependencias externas</span></label>
                <label class="checkbox-option"><input type="checkbox" name="factores" value="Deuda técnica"><span class="checkbox-label-text">Deuda técnica</span></label>
                <label class="checkbox-option"><input type="checkbox" name="factores" value="Fallas en pruebas"><span class="checkbox-label-text">Fallas en pruebas</span></label>
                <label class="checkbox-option"><input type="checkbox" name="factores" value="Fallas en producción"><span class="checkbox-label-text">Fallas en producción</span></label>
                <label class="checkbox-option"><input type="checkbox" name="factores" value="Carga excesiva"><span class="checkbox-label-text">Carga excesiva</span></label>
                <label class="checkbox-option"><input type="checkbox" name="factores" value="Ausencias"><span class="checkbox-label-text">Ausencias</span></label>
                <label class="checkbox-option"><input type="checkbox" name="factores" value="Movimiento personas clave"><span class="checkbox-label-text">Movimiento de personas clave</span></label>
                <label class="checkbox-option"><input type="checkbox" name="factores" value="Curva de aprendizaje"><span class="checkbox-label-text">Curva de aprendizaje</span></label>
                <label class="checkbox-option"><input type="checkbox" name="factores" value="Muchas reuniones"><span class="checkbox-label-text">Muchas reuniones</span></label>

            </div>
        </section>

        <section class="form-section">
            <label class="form-label required" for="observaciones">3. Observaciones</label>
            <textarea id="observaciones" name="observaciones" rows="4" placeholder="Comparte detalles adicionales sobre las fricciones o aciertos del sprint..." required></textarea>
        </section>

        <button type="submit" id="submitBtn" class="btn-submit">
            <span>Enviar Feedback</span>
        </button>

    </form>
</main>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwbzBRXKZhxZFmGzChPYxEh0ELIbmuxvbSWhwZMz53v5I0lZNP6hYIgnkg9ZUD2kB7Mpw/exec';
    
    const form = document.getElementById('sprintForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault(); 
        
        const checkboxes = document.querySelectorAll('input[name="factores"]:checked');
        if (checkboxes.length === 0) {
            alert('Por favor, selecciona al menos un factor.');
            return;
        }

        // UX: Estado de carga en el botón
        submitBtn.disabled = true;
        submitBtn.innerHTML = `
            <svg class="spinner" viewBox="0 0 50 50" style="width: 20px; height: 20px; animation: rotate 2s linear infinite;">
                <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5" stroke-dasharray="1, 200" stroke-dashoffset="0" style="stroke-linecap: round; animation: dash 1.5s ease-in-out infinite;"></circle>
            </svg>
            <span>Procesando...</span>
        `;

        const formData = new FormData(form);
        const seleccionados = Array.from(checkboxes).map(cb => cb.value).join(', ');
        formData.set('factores', seleccionados); 
        const URLDatos = new URLSearchParams(formData);

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: URLDatos,
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        })
        .then(() => {
            // UX: Mensaje de éxito o redirección sutil
            alert('¡Feedback registrado correctamente! Gracias por tu aporte.');
            form.reset();
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Ocurrió un error de conexión.');
        })
        .finally(() => {
            // Restaurar estado del botón
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span>Enviar Feedback</span>';
        });
    });

    // Animación para el spinner del botón
    const style = document.createElement('style');
    style.innerHTML = `
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes dash { 
            0% { stroke-dasharray: 1, 200; stroke-dashoffset: 0; } 
            50% { stroke-dasharray: 90, 200; stroke-dashoffset: -35px; } 
            100% { stroke-dasharray: 90, 200; stroke-dashoffset: -124px; } 
        }
    `;
    document.head.appendChild(style);
</script>

</body>
</html>
