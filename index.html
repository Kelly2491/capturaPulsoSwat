<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargar Pulso de Sprint</title>
    <!-- Tailwind CSS para los estilos rápidos y modernos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons para los iconos idénticos a tu diseño -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Fuente Inter de Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brandDark: '#121626',
                        brandCard: '#1A2133',
                        brandGreen: '#10B981',
                        brandGreenHover: '#059669',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F19; /* Fondo oscuro de la app */
            color: #E2E8F0;
        }

        /* Estilo para la zona punteada cuando se arrastra un archivo encima */
        .drag-over {
            border-color: #10B981 !important;
            background-color: rgba(16, 185, 129, 0.05) !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Modal Container -->
    <div class="bg-brandCard w-full max-w-xl rounded-xl shadow-2xl border border-gray-800 overflow-hidden">
        
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800">
            <div class="flex items-center gap-2">
                <div class="w-2.5 h-2.5 rounded-full bg-brandGreen"></div>
                <h2 class="text-white font-semibold tracking-wide text-sm">CARGAR PULSO DE NUEVO SPRINT</h2>
            </div>
            <button class="text-gray-400 hover:text-white transition-colors">
                <i class="ph ph-x text-lg"></i>
            </button>
        </div>

        <div class="p-6">
            <!-- Alert Info -->
            <div class="bg-[#064e3b]/30 border border-[#065f46] rounded-lg p-4 flex gap-3 mb-6">
                <i class="ph ph-info text-brandGreen text-xl shrink-0"></i>
                <p class="text-sm text-[#34d399] leading-relaxed">
                    El sistema procesará los datos pero <strong>**eliminará de inmediato**</strong> los nombres y correos para mantener anonimato absoluto.
                </p>
            </div>

            <form id="uploadForm">
                <!-- Inputs -->
                <div class="space-y-5 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Identificador del Sprint:</label>
                        <input type="text" value="Sprint 78" 
                            class="w-full bg-[#0F131F] border border-gray-700 rounded-md px-4 py-2.5 text-sm text-white focus:outline-none focus:border-brandGreen transition-colors">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Periodo:</label>
                        <input type="text" value="Junio 2026" 
                            class="w-full bg-[#0F131F] border border-gray-700 rounded-md px-4 py-2.5 text-sm text-white focus:outline-none focus:border-brandGreen transition-colors">
                    </div>
                </div>

                <!-- Custom File Upload Zone -->
                <div class="mb-8">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Archivo de Respuestas (Formato CSV de Excel):</label>
                    
                    <!-- Input nativo oculto -->
                    <input type="file" id="fileInput" class="hidden" accept=".csv, .txt, .xlsx, .xls">
                    
                    <!-- Zona interactiva visual -->
                    <div id="dropZone" 
                         class="border-2 border-dashed border-gray-600 rounded-xl p-8 text-center cursor-pointer transition-all hover:bg-[#151b29] hover:border-brandGreen group relative">
                        
                        <!-- Contenido cuando NO hay archivo -->
                        <div id="uploadPrompt" class="flex flex-col items-center justify-center">
                            <i class="ph ph-upload-simple text-3xl text-brandGreen mb-3 group-hover:-translate-y-1 transition-transform"></i>
                            <p class="text-sm text-gray-300 mb-1">
                                <span class="text-brandGreen font-medium">Haz clic para cargar</span> o arrastra tu archivo aquí
                            </p>
                            <p class="text-xs text-gray-500">Admite archivos Excel, .csv o .txt</p>
                        </div>

                        <!-- Contenido cuando SÍ hay archivo cargado (Oculto por defecto) -->
                        <div id="fileInfo" class="hidden flex flex-col items-center justify-center">
                            <i class="ph-fill ph-file-csv text-4xl text-brandGreen mb-2"></i>
                            <p id="fileName" class="text-sm font-medium text-white mb-1">nombre_del_archivo.csv</p>
                            <p id="fileSize" class="text-xs text-gray-500 mb-3">15 KB</p>
                            <button type="button" id="removeFileBtn" class="text-xs text-red-400 hover:text-red-300 font-medium px-3 py-1 bg-red-400/10 rounded-md transition-colors">
                                Eliminar archivo
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center justify-between pt-2">
                    <button type="button" class="text-sm font-medium text-gray-400 hover:text-white transition-colors px-4 py-2">
                        Cancelar
                    </button>
                    <button type="submit" class="bg-brandGreen hover:bg-brandGreenHover text-white text-sm font-medium px-6 py-2.5 rounded-md flex items-center gap-2 transition-colors shadow-lg shadow-brandGreen/20">
                        <i class="ph ph-check text-lg"></i>
                        Procesar Anónimamente
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script para la lógica del Drag & Drop -->
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const fileInfo = document.getElementById('fileInfo');
        const fileNameDisplay = document.getElementById('fileName');
        const fileSizeDisplay = document.getElementById('fileSize');
        const removeFileBtn = document.getElementById('removeFileBtn');

        // 1. Abrir explorador al hacer clic en la zona
        dropZone.addEventListener('click', (e) => {
            // Evitar que el clic en el botón "Eliminar" abra el explorador
            if (e.target !== removeFileBtn) {
                fileInput.click();
            }
        });

        // 2. Prevenir comportamientos por defecto del navegador para el Drag & Drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // 3. Efecto visual al arrastrar por encima
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.add('drag-over');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.remove('drag-over');
            }, false);
        });

        // 4. Manejar el archivo cuando se suelta (Drop)
        dropZone.addEventListener('drop', (e) => {
            let dt = e.dataTransfer;
            let files = dt.files;
            
            if (files.length > 0) {
                fileInput.files = files; // Asignar el archivo al input oculto
                updateUIWithFile(files[0]);
            }
        });

        // 5. Manejar el archivo cuando se selecciona por el explorador (Click)
        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                updateUIWithFile(this.files[0]);
            }
        });

        // 6. Remover archivo seleccionado
        removeFileBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Evita que se abra el explorador
            fileInput.value = ''; // Limpiar el input
            
            // Restaurar la UI
            uploadPrompt.classList.remove('hidden');
            fileInfo.classList.add('hidden');
            dropZone.classList.remove('border-brandGreen', 'bg-[#151b29]');
            dropZone.classList.add('border-gray-600');
        });

        // Función para actualizar la interfaz con los datos del archivo
        function updateUIWithFile(file) {
            // Validar extensión (opcional)
            const validExtensions = ['.csv', '.txt', '.xlsx', '.xls'];
            const fileExtension = '.' + file.name.split('.').pop().toLowerCase();
            
            if (!validExtensions.includes(fileExtension)) {
                alert('Por favor, selecciona un archivo válido (.csv, .txt o Excel)');
                fileInput.value = ''; // Limpiar
                return;
            }

            // Mostrar tamaño formateado
            let sizeStr = '';
            if(file.size < 1024) sizeStr = file.size + ' B';
            else if(file.size < 1048576) sizeStr = (file.size / 1024).toFixed(1) + ' KB';
            else sizeStr = (file.size / 1048576).toFixed(1) + ' MB';

            fileNameDisplay.textContent = file.name;
            fileSizeDisplay.textContent = sizeStr;

            // Cambiar la vista
            uploadPrompt.classList.add('hidden');
            fileInfo.classList.remove('hidden');
            
            // Estilizar la caja para indicar éxito
            dropZone.classList.remove('border-gray-600');
            dropZone.classList.add('border-brandGreen', 'bg-[#151b29]');
        }
        
        // Manejar envío del formulario
        document.getElementById('uploadForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) {
                alert("Por favor, selecciona un archivo antes de procesar.");
                return;
            }
            alert("Archivo listo para ser procesado: " + file.name + "\nAquí conectarías con tu backend.");
            // Aquí puedes usar FormData y fetch() para enviar a tu servidor o App Script.
        });
    </script>
</body>
</html>
